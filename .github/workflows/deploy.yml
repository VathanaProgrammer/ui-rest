name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies and build test
        run: |
          npm install
          npm run build
          
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: vathanaprogrammer/ui-rest:latest
          
      - name: Deploy to K3s
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 54.169.242.108
          username: ubuntu
          key: ${{ secrets.UI_EC2_SSH_KEY }}
          script: |
            sudo k3s kubectl rollout restart deployment/ui-rest-deployment
      - name: Send Telegram Notification (Success)
        uses: appleboy/telegram-action@master
        if: success()
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ DEPLOYMENT SUCCESS ✅
            ------------------------------------
            🚀 Application: ui-rest
            🔗 Live URL: https://ui.learner-teach.online
            👤 Author: ${{ github.actor }}
            📝 Commit: ${{ github.event.head_commit.message }}
            ------------------------------------
            Awesome job, ${{ github.actor }}! The frontend deployment is fully live! 🎉

      - name: Send Telegram Sticker (Success)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendSticker" \
            -d chat_id="${{ secrets.TELEGRAM_TO }}" \
            -d sticker="CAACAgIAAxkBAAERUwxqIFkagZkp7hv44xv3pB-Fxr8AAdMAAiQ_AAJVA2hIAVvZ-JnLXns7BA"
      - name: Send Telegram Notification (Failure)
        uses: appleboy/telegram-action@master
        if: failure()
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ DEPLOYMENT FAILED ❌
            ------------------------------------
            🚀 Application: ui-rest
            👤 Author: ${{ github.actor }}
            📝 Commit: ${{ github.event.head_commit.message }}
            ------------------------------------
            Hey ${{ github.actor }}, the deployment pipeline failed.
            🔍 Review the logs here: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Telegram Sticker (Failure)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendSticker" \
            -d chat_id="${{ secrets.TELEGRAM_TO }}" \
            -d sticker="CAACAgEAAxkBAAERUwpqIFj55atsc17CP92HuAQ971hzzAAC5gQAAv5kqUWwl_aWeP3zATsE"
