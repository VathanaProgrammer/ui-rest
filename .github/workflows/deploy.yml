name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies and build test
        run: |
          npm install
          npm run build
          
      - name: Copy Files to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: 13.212.150.130
          username: ubuntu
          key: ${{ secrets.UI_EC2_SSH_KEY }}
          source: "dist,nginx.conf,Dockerfile"
          target: "~/deploy-ui"
          
      - name: Build and Deploy to K3s
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 13.212.150.130
          username: ubuntu
          key: ${{ secrets.UI_EC2_SSH_KEY }}
          script: |
            cd ~/deploy-ui
            docker build -t ui-rest:latest .
            docker save ui-rest:latest > ui-rest.tar
            sudo k3s ctr images import ui-rest.tar
            sudo k3s kubectl set image deployment/ui-rest-deployment ui-rest=ui-rest:latest --local -o yaml | sudo k3s kubectl apply -f -
            sudo k3s kubectl rollout restart deployment ui-rest-deployment
            rm ui-rest.tar
      - name: Send Telegram Notification (Success)
        uses: appleboy/telegram-action@master
        if: success()
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ DEPLOYMENT SUCCESS ✅
            ------------------------------------
            🚀 Application: ui-rest
            🔗 Live URL: https://ui.learner-teach.online
            👤 Author: ${{ github.actor }}
            📝 Commit: ${{ github.event.head_commit.message }}
            ------------------------------------
            Awesome job, ${{ github.actor }}! The frontend deployment is fully live! 🎉

      - name: Send Telegram Sticker (Success)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendSticker" \
            -d chat_id="${{ secrets.TELEGRAM_TO }}" \
            -d sticker="CAACAgIAAxkBAAERUwxqIFkagZkp7hv44xv3pB-Fxr8AAdMAAiQ_AAJVA2hIAVvZ-JnLXns7BA"
      - name: Send Telegram Notification (Failure)
        uses: appleboy/telegram-action@master
        if: failure()
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ DEPLOYMENT FAILED ❌
            ------------------------------------
            🚀 Application: ui-rest
            👤 Author: ${{ github.actor }}
            📝 Commit: ${{ github.event.head_commit.message }}
            ------------------------------------
            Hey ${{ github.actor }}, the deployment pipeline failed.
            🔍 Review the logs here: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Telegram Sticker (Failure)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendSticker" \
            -d chat_id="${{ secrets.TELEGRAM_TO }}" \
            -d sticker="CAACAgEAAxkBAAERUwpqIFj55atsc17CP92HuAQ971hzzAAC5gQAAv5kqUWwl_aWeP3zATsE"
